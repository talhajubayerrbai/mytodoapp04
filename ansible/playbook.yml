---
- name: Configure Python FastAPI application server
  hosts: app
  become: true
  vars:
    app_dir: /opt/myapp
    app_user: ubuntu
    venv_dir: /opt/myapp/.venv
    service_name: myapp
    # DB vars are passed in via --extra-vars from the CI workflow
    db_host: "{{ db_host }}"
    db_port: "{{ db_port | default(5432) }}"
    db_name: "{{ db_name | default('tododb') }}"
    db_user: "{{ db_user | default('todoapp') }}"
    db_password: "{{ db_password }}"

  tasks:
    # ── System dependencies ────────────────────────────────────────────────────

    - name: Update apt cache and install system dependencies
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - build-essential
          - acl
          - nginx
          - git
          - curl
          - libpq-dev
          - postgresql-client
        state: present
        update_cache: true

    # ── Application directory ─────────────────────────────────────────────────

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    # ── Sync application source ───────────────────────────────────────────────

    - name: Synchronize application source to server
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      loop:
        - { src: "../app/", dest: "{{ app_dir }}/app/" }
        - { src: "../main.py", dest: "{{ app_dir }}/main.py" }

    - name: Synchronize Alembic configuration
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      loop:
        - { src: "../alembic.ini", dest: "{{ app_dir }}/alembic.ini" }
        - { src: "../alembic/", dest: "{{ app_dir }}/alembic/" }

    - name: Check if requirements.txt exists
      ansible.builtin.stat:
        path: "../requirements.txt"
      register: req_file
      delegate_to: localhost

    - name: Copy requirements.txt if present
      ansible.builtin.copy:
        src: "../requirements.txt"
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: req_file.stat.exists

    - name: Write minimal requirements.txt if not present
      ansible.builtin.shell: |
        cat > {{ app_dir }}/requirements.txt <<'EOF'
        fastapi>=0.110.0
        uvicorn[standard]>=0.29.0
        gunicorn>=21.2.0
        python-dotenv>=1.0.0
        sqlalchemy[asyncio]>=2.0.0
        asyncpg>=0.29.0
        psycopg2-binary>=2.9.9
        alembic>=1.13.0
        python-multipart>=0.0.9
        pydantic>=2.6.0
        pydantic-settings>=2.2.0
        aiofiles>=23.2.1
        EOF
      args:
        creates: "{{ app_dir }}/requirements.txt"
      when: not req_file.stat.exists

    - name: Check if public/ directory exists locally
      ansible.builtin.stat:
        path: "../public"
      register: public_dir
      delegate_to: localhost

    - name: Synchronize public/ directory if it exists
      ansible.builtin.copy:
        src: "../public/"
        dest: "{{ app_dir }}/public/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: public_dir.stat.exists and public_dir.stat.isdir

    # ── Environment file ──────────────────────────────────────────────────────

    - name: Write .env file with database credentials
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"
        content: |
          APP_ENV=production
          HOST=0.0.0.0
          PORT=8000
          DB_HOST={{ db_host }}
          DB_PORT={{ db_port }}
          DB_NAME={{ db_name }}
          DB_USER={{ db_user }}
          DB_PASSWORD={{ db_password }}

    # ── Python virtualenv & dependencies ──────────────────────────────────────

    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv {{ venv_dir }}
        creates: "{{ venv_dir }}/bin/activate"
      become_user: "{{ app_user }}"

    - name: Upgrade pip in virtualenv
      ansible.builtin.pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3
      become_user: "{{ app_user }}"

    - name: Install Python dependencies
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3
      become_user: "{{ app_user }}"

    # ── Alembic migrations ────────────────────────────────────────────────────

    - name: Run Alembic database migrations
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/alembic upgrade head"
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"
      environment:
        DB_HOST: "{{ db_host }}"
        DB_PORT: "{{ db_port }}"
        DB_NAME: "{{ db_name }}"
        DB_USER: "{{ db_user }}"
        DB_PASSWORD: "{{ db_password }}"
      register: alembic_result
      changed_when: "'Running upgrade' in alembic_result.stdout"

    - name: Show migration output
      ansible.builtin.debug:
        var: alembic_result.stdout_lines

    # ── Fix ownership ─────────────────────────────────────────────────────────

    - name: Set correct ownership on application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    # ── Systemd service ───────────────────────────────────────────────────────

    - name: Create systemd service unit for the application
      ansible.builtin.copy:
        dest: /etc/systemd/system/{{ service_name }}.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=mytodoapp04-fix FastAPI Application
          After=network.target

          [Service]
          Type=exec
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          Environment="PATH={{ venv_dir }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier={{ service_name }}

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and restart application service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        enabled: true
        state: restarted

    - name: Wait for application to be healthy on port 8000
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8000
        delay: 5
        timeout: 60
        state: started

    # ── Nginx ─────────────────────────────────────────────────────────────────

    - name: Configure nginx reverse proxy
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/{{ service_name }}
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name _;

              client_max_body_size 10M;

              location / {
                  proxy_pass http://127.0.0.1:8000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 60s;
                  proxy_send_timeout 60s;
                  proxy_read_timeout 60s;
              }
          }

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/{{ service_name }}
        dest: /etc/nginx/sites-enabled/{{ service_name }}
        state: link

    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test nginx configuration
      ansible.builtin.command:
        cmd: nginx -t
      changed_when: false

    - name: Enable and restart nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: restarted

    # ── Final health check ────────────────────────────────────────────────────

    - name: Verify application responds via nginx on port 80
      ansible.builtin.uri:
        url: "http://127.0.0.1:80/health"
        method: GET
        status_code: [200, 307, 301, 302]
        follow_redirects: all
        timeout: 30
      register: health_response
      retries: 5
      delay: 5
      until: health_response.status in [200, 307, 301, 302]
