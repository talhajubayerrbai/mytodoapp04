---
- name: Configure app server
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: ubuntu
    app_port: 8000
    # These are passed as --extra-vars from the CI configure job:
    # db_host, db_name, db_user, db_password, project_name

  tasks:
    #  System packages 

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - python3.12
          - python3.12-venv
          - python3.12-dev
          - python3-pip
          - nginx
          - git
          - curl
          - build-essential
          - libpq-dev
          - pkg-config
        state: present

    #  App directory 

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    #  Sync application code 

    - name: Sync app source - main entrypoint
      copy:
        src: ../main.py
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Sync app package
      synchronize:
        src: ../app/
        dest: "{{ app_dir }}/app/"
        delete: true
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"

    - name: Fix app package ownership
      file:
        path: "{{ app_dir }}/app"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    - name: Sync alembic directory
      synchronize:
        src: ../alembic/
        dest: "{{ app_dir }}/alembic/"
        delete: true
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"

    - name: Fix alembic ownership
      file:
        path: "{{ app_dir }}/alembic"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    - name: Check if alembic.ini exists
      stat:
        path: "{{ playbook_dir }}/../alembic.ini"
      register: alembic_ini_stat
      delegate_to: localhost

    - name: Sync alembic.ini (if present)
      copy:
        src: ../alembic.ini
        dest: "{{ app_dir }}/alembic.ini"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: alembic_ini_stat.stat.exists

    - name: Create default alembic.ini (if not present in repo)
      shell: |
        cat > {{ app_dir }}/alembic.ini << 'ALEMBICINI'
        [alembic]
        script_location = alembic
        prepend_sys_path = .
        version_path_separator = os
        sqlalchemy.url = driver://user:pass@localhost/dbname

        [loggers]
        keys = root,sqlalchemy,alembic

        [handlers]
        keys = console

        [formatters]
        keys = generic

        [logger_root]
        level = WARN
        handlers = console
        qualname =

        [logger_sqlalchemy]
        level = WARN
        handlers =
        qualname = sqlalchemy.engine

        [logger_alembic]
        level = INFO
        handlers =
        qualname = alembic

        [handler_console]
        class = StreamHandler
        args = (sys.stderr,)
        level = NOTSET
        formatter = generic

        [formatter_generic]
        format = %(levelname)-5.5s [%(name)s] %(message)s
        datefmt = %%H:%%M:%%S
        ALEMBICINI
      args:
        creates: "{{ app_dir }}/alembic.ini"
      when: not alembic_ini_stat.stat.exists

    - name: Check if requirements.txt exists
      stat:
        path: "{{ playbook_dir }}/../requirements.txt"
      register: req_stat
      delegate_to: localhost

    - name: Sync requirements.txt (if present)
      copy:
        src: ../requirements.txt
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: req_stat.stat.exists

    - name: Check if public/ directory exists
      stat:
        path: "{{ playbook_dir }}/../public"
      register: public_dir_stat
      delegate_to: localhost

    - name: Sync public/ static assets (if present)
      synchronize:
        src: ../public/
        dest: "{{ app_dir }}/public/"
        delete: true
      when: public_dir_stat.stat.exists

    - name: Fix public/ ownership
      file:
        path: "{{ app_dir }}/public"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true
      when: public_dir_stat.stat.exists

    #  Python virtual environment 

    - name: Create Python virtual environment
      command: python3.12 -m venv {{ venv_dir }}
      args:
        creates: "{{ venv_dir }}/bin/python"
      become_user: "{{ app_user }}"

    - name: Upgrade pip in venv
      command: "{{ venv_dir }}/bin/pip install --upgrade pip"
      become_user: "{{ app_user }}"

    - name: Install Python dependencies from requirements.txt
      command: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
      become_user: "{{ app_user }}"
      when: req_stat.stat.exists

    - name: Install core Python dependencies (if no requirements.txt)
      command: >
        {{ venv_dir }}/bin/pip install
        fastapi uvicorn[standard] gunicorn
        sqlalchemy[asyncio] asyncpg psycopg2-binary
        alembic pydantic pydantic-settings python-dotenv
      become_user: "{{ app_user }}"
      when: not req_stat.stat.exists

    #  Environment file 

    - name: Write .env file
      shell: |
        cat > {{ app_dir }}/.env << 'ENVEOF'
        APP_ENV=production
        HOST=0.0.0.0
        PORT={{ app_port }}
        DB_HOST={{ db_host }}
        DB_PORT=5432
        DB_NAME={{ db_name }}
        DB_USER={{ db_user }}
        DB_PASSWORD={{ db_password }}
        ENVEOF
        chmod 600 {{ app_dir }}/.env
        chown {{ app_user }}:{{ app_user }} {{ app_dir }}/.env

    #  Alembic migrations 

    - name: Run Alembic migrations
      command: "{{ venv_dir }}/bin/alembic upgrade head"
      args:
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"
      environment:
        DB_HOST: "{{ db_host }}"
        DB_PORT: "5432"
        DB_NAME: "{{ db_name }}"
        DB_USER: "{{ db_user }}"
        DB_PASSWORD: "{{ db_password }}"

    #  Systemd service 

    - name: Create systemd service for gunicorn
      copy:
        dest: /etc/systemd/system/app.service
        content: |
          [Unit]
          Description=mytodoapp04 FastAPI application
          After=network.target

          [Service]
          Type=notify
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
            -k uvicorn.workers.UvicornWorker \
            -w 4 \
            -b 0.0.0.0:{{ app_port }} \
            --timeout 120 \
            --access-logfile - \
            --error-logfile -
          ExecReload=/bin/kill -s HUP $MAINPID
          Restart=always
          RestartSec=5
          KillMode=mixed
          TimeoutStopSec=5
          PrivateTmp=true

          [Install]
          WantedBy=multi-user.target
        mode: "0644"

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start app service
      systemd:
        name: app
        enabled: true
        state: restarted

    #  Nginx configuration 

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              server_name _;

              client_max_body_size 20M;

              location / {
                  proxy_pass         http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection "upgrade";
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
                  proxy_connect_timeout 75s;
              }
          }
        mode: "0644"

    - name: Enable nginx app site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Test nginx configuration
      command: nginx -t
      changed_when: false

    - name: Enable and restart nginx
      systemd:
        name: nginx
        enabled: true
        state: restarted

    #  Final health check on the server 

    - name: Wait for app to be healthy
      uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        status_code: [200, 307]
        follow_redirects: all
      register: health_result
      retries: 12
      delay: 10
      until: health_result.status in [200, 201, 301, 302, 307]