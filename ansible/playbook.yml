---
- name: Configure Python FastAPI application server
  hosts: app
  become: true
  vars:
    app_dir: /opt/myapp
    app_user: ubuntu
    venv_dir: /opt/myapp/.venv
    service_name: myapp

  tasks:
    - name: Update apt cache and install system dependencies
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - build-essential
          - acl
          - nginx
          - git
          - curl
        state: present
        update_cache: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Synchronize application source to server
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      loop:
        - { src: "../app/", dest: "{{ app_dir }}/app/" }
        - { src: "../main.py", dest: "{{ app_dir }}/main.py" }

    - name: Check if requirements.txt exists
      ansible.builtin.stat:
        path: "../requirements.txt"
      register: req_file
      delegate_to: localhost

    - name: Copy requirements.txt if present
      ansible.builtin.copy:
        src: "../requirements.txt"
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: req_file.stat.exists

    - name: Write minimal requirements.txt if not present
      ansible.builtin.shell: |
        cat > {{ app_dir }}/requirements.txt <<'EOF'
        fastapi>=0.100.0
        uvicorn[standard]>=0.23.0
        gunicorn>=21.0.0
        python-multipart>=0.0.6
        aiofiles>=23.0.0
        EOF
      args:
        creates: "{{ app_dir }}/requirements.txt"
      when: not req_file.stat.exists

    - name: Check if public/ directory exists locally
      ansible.builtin.stat:
        path: "../public"
      register: public_dir
      delegate_to: localhost

    - name: Synchronize public/ directory if it exists
      ansible.builtin.copy:
        src: "../public/"
        dest: "{{ app_dir }}/public/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: public_dir.stat.exists and public_dir.stat.isdir

    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv {{ venv_dir }}
        creates: "{{ venv_dir }}/bin/activate"
      become_user: "{{ app_user }}"

    - name: Upgrade pip in virtualenv
      ansible.builtin.pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3
      become_user: "{{ app_user }}"

    - name: Install Python dependencies
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3
      become_user: "{{ app_user }}"

    - name: Set correct ownership on application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    - name: Create systemd service unit for the application
      ansible.builtin.copy:
        dest: /etc/systemd/system/{{ service_name }}.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=mytodoapp04 FastAPI Application
          After=network.target

          [Service]
          Type=exec
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          Environment="PATH={{ venv_dir }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="APP_ENV=production"
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier={{ service_name }}

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start application service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        enabled: true
        state: started

    - name: Wait for application to be healthy on port 8000
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8000
        delay: 5
        timeout: 60
        state: started

    - name: Configure nginx reverse proxy
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/{{ service_name }}
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:8000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 60s;
                  proxy_send_timeout 60s;
                  proxy_read_timeout 60s;
              }
          }

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/{{ service_name }}
        dest: /etc/nginx/sites-enabled/{{ service_name }}
        state: link

    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test nginx configuration
      ansible.builtin.command:
        cmd: nginx -t
      changed_when: false

    - name: Enable and restart nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: restarted

    - name: Verify application responds via nginx on port 80
      ansible.builtin.uri:
        url: "http://127.0.0.1:80/health"
        method: GET
        status_code: [200, 307, 301, 302]
        follow_redirects: all
        timeout: 30
      register: health_response
      retries: 5
      delay: 5
      until: health_response.status in [200, 307, 301, 302]