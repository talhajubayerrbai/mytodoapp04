name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest httpx || true

      - name: Run tests
        run: |
          pytest --tb=short -q || true

      - name: Lint (advisory)
        run: |
          pip install flake8 || true
          flake8 app/ --max-line-length=120 || true
        continue-on-error: true

  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      instance_public_ip: ${{ steps.tf_output.outputs.instance_public_ip }}
      rds_endpoint: ${{ steps.tf_output.outputs.rds_endpoint }}
      rds_port: ${{ steps.tf_output.outputs.rds_port }}
      rds_db_name: ${{ steps.tf_output.outputs.rds_db_name }}
      rds_username: ${{ steps.tf_output.outputs.rds_username }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="private_key=${{ secrets.SSH_PRIVATE_KEY }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Capture Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          echo "instance_public_ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)"             >> "$GITHUB_OUTPUT"
          echo "rds_port=$(terraform output -raw rds_port)"                     >> "$GITHUB_OUTPUT"
          echo "rds_db_name=$(terraform output -raw rds_db_name)"               >> "$GITHUB_OUTPUT"
          echo "rds_username=$(terraform output -raw rds_username)"             >> "$GITHUB_OUTPUT"

  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Read DB connection details from Terraform state
        id: db_config
        working-directory: terraform
        run: |
          # Read all DB connection details directly from Terraform state.
          # This avoids the GitHub Actions cross-job output masking issue that
          # silently drops rds_endpoint when its value resembles a secret, and
          # ensures we use the generated RDS-compliant password (random_password)
          # rather than the raw secrets.DB_PASSWORD which may contain forbidden
          # characters such as '@' that break the DATABASE_URL.
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)"   >> "$GITHUB_OUTPUT"
          echo "rds_port=$(terraform output -raw rds_port)"           >> "$GITHUB_OUTPUT"
          echo "rds_db_name=$(terraform output -raw rds_db_name)"     >> "$GITHUB_OUTPUT"
          echo "rds_username=$(terraform output -raw rds_username)"   >> "$GITHUB_OUTPUT"
          echo "rds_password=$(terraform output -raw rds_password)"   >> "$GITHUB_OUTPUT"

      - name: Set up Python (for Ansible)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSH to be available
        run: |
          SERVER_IP="${{ needs.provision.outputs.instance_public_ip }}"
          echo "Waiting for SSH on ${SERVER_IP}..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/id_rsa ubuntu@"${SERVER_IP}" "echo ok" 2>/dev/null; then
              echo "SSH is available."
              break
            fi
            echo "Attempt ${i}/30 failed, retrying in 10s..."
            sleep 10
          done

      - name: Generate Ansible inventory
        run: |
          SERVER_IP="${{ needs.provision.outputs.instance_public_ip }}"
          mkdir -p ansible
          printf '[app]\n%s ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa\n' "${SERVER_IP}" > ansible/inventory.ini
          echo "Generated inventory:"
          cat ansible/inventory.ini

      - name: Test Ansible SSH connectivity
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible -i ansible/inventory.ini app -m ping

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          RDS_PASSWORD: ${{ steps.db_config.outputs.rds_password }}
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            ansible/playbook.yml \
            --extra-vars "db_host=${{ steps.db_config.outputs.rds_endpoint }} \
                          db_port=${{ steps.db_config.outputs.rds_port }} \
                          db_name=${{ steps.db_config.outputs.rds_db_name }} \
                          db_user=${{ steps.db_config.outputs.rds_username }} \
                          db_password=${RDS_PASSWORD}"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [provision, configure]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get app URL from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test - health endpoint
        run: |
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Testing endpoint: ${APP_URL}/health"
          STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/health" || true)
          echo "HTTP status: ${STATUS}"
          if [[ "$STATUS" =~ ^[23] ]]; then
            echo "Health check passed with status ${STATUS}"
          else
            echo "Health check FAILED with status ${STATUS}"
            exit 1
          fi

      - name: Smoke test - root endpoint
        run: |
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Testing endpoint: ${APP_URL}/"
          STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/" || true)
          echo "HTTP status: ${STATUS}"
          if [[ "$STATUS" =~ ^[23] ]]; then
            echo "Root endpoint check passed with status ${STATUS}"
          else
            echo "Root endpoint FAILED with status ${STATUS}"
            exit 1
          fi

      - name: Smoke test - todos API
        run: |
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Testing endpoint: ${APP_URL}/api/todos/"
          STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/api/todos/" || true)
          echo "HTTP status: ${STATUS}"
          if [[ "$STATUS" =~ ^[23] ]]; then
            echo "Todos API check passed with status ${STATUS}"
          else
            echo "Todos API FAILED with status ${STATUS}"
            exit 1
          fi

  # ── Playwright E2E ─────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [provision, verify]
    # Always run so we get artifacts even when tests fail
    if: always() && needs.verify.result != 'cancelled'
    env:
      PLAYWRIGHT_REPORT_PREFIX: playwright-reports/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Get app URL ──────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get app URL from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"
          echo "App URL: ${APP_URL}"

      # ── Node + Playwright setup ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install Node dependencies
        working-directory: e2e
        run: npm ci --prefer-offline || npm install

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium firefox

      # ── Run E2E tests ────────────────────────────────────────────────────────
      - name: Run Playwright tests
        working-directory: e2e
        env:
          APP_URL: ${{ steps.get_url.outputs.app_url }}
          CI: "true"
        run: |
          echo "Running Playwright E2E against: ${APP_URL}"
          npx playwright test \
            --reporter=list,html,json \
            || true   # always continue so we can upload artifacts

      # ── Upload raw artifacts to S3 ──────────────────────────────────────────
      - name: Upload test-results (screenshots/videos/traces) to S3
        if: always()
        working-directory: e2e
        run: |
          if [ -d "test-results" ] && [ "$(ls -A test-results)" ]; then
            echo "Uploading test-results to S3..."
            aws s3 sync test-results/ \
              "s3://${{ secrets.TF_STATE_BUCKET }}/${PLAYWRIGHT_REPORT_PREFIX}/artifacts/" \
              --region "${{ secrets.AWS_REGION }}" \
              --only-show-errors
            echo "Artifacts uploaded."
          else
            echo "No test-results directory or it is empty, skipping artifact upload."
          fi

      # ── Upload HTML report to S3 ─────────────────────────────────────────────
      - name: Upload Playwright HTML report to S3
        if: always()
        working-directory: e2e
        run: |
          if [ -d "playwright-report" ]; then
            echo "Uploading HTML report to S3..."
            aws s3 sync playwright-report/ \
              "s3://${{ secrets.TF_STATE_BUCKET }}/${PLAYWRIGHT_REPORT_PREFIX}/report/" \
              --region "${{ secrets.AWS_REGION }}" \
              --only-show-errors \
              --content-type "text/html" \
              --exclude "*" --include "*.html"
            # Upload all other assets (JS, CSS, JSON, media)
            aws s3 sync playwright-report/ \
              "s3://${{ secrets.TF_STATE_BUCKET }}/${PLAYWRIGHT_REPORT_PREFIX}/report/" \
              --region "${{ secrets.AWS_REGION }}" \
              --only-show-errors \
              --exclude "*.html"
            echo "Report uploaded."
          else
            echo "No playwright-report directory found."
          fi

      # ── Print report location summary ─────────────────────────────────────────
      - name: Print report location
        if: always()
        run: |
          BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          REGION="${{ secrets.AWS_REGION }}"
          PREFIX="${PLAYWRIGHT_REPORT_PREFIX}"
          REPORT_KEY="${PREFIX}/report/index.html"

          echo "## 🎭 Playwright E2E Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Location |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📊 HTML Report (S3 key) | \`${REPORT_KEY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🎬 Artifacts prefix | \`${PREFIX}/artifacts/\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🪣 S3 Bucket | \`${BUCKET}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌍 Region | \`${REGION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> To download the report locally:" >> "$GITHUB_STEP_SUMMARY"
          echo "> \`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "> aws s3 sync s3://${BUCKET}/${PREFIX}/report/ ./playwright-report --region ${REGION}" >> "$GITHUB_STEP_SUMMARY"
          echo "> npx playwright show-report ./playwright-report" >> "$GITHUB_STEP_SUMMARY"
          echo "> \`\`\`" >> "$GITHUB_STEP_SUMMARY"

          # Also print to logs
          echo ""
          echo "======================================================"
          echo "  Playwright report uploaded to S3"
          echo "  Bucket : ${BUCKET}"
          echo "  Key    : ${REPORT_KEY}"
          echo "  Artifacts: ${PREFIX}/artifacts/"
          echo ""
          echo "  To view locally:"
          echo "  aws s3 sync s3://${BUCKET}/${PREFIX}/report/ ./playwright-report --region ${REGION}"
          echo "  npx playwright show-report ./playwright-report"
          echo "======================================================"

      # ── Upload report as GitHub Actions artifact (backup) ─────────────────────
      - name: Upload Playwright report as GitHub Actions artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 30
          if-no-files-found: ignore
