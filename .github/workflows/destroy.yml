name: Destroy

on:
  workflow_dispatch:

jobs:
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Disable RDS deletion protection
        run: |
          DB_ID="${{ secrets.PROJECT_NAME }}-db"

          # Check current deletion-protection state
          DELETION_PROTECTION=$(aws rds describe-db-instances \
            --db-instance-identifier "$DB_ID" \
            --query 'DBInstances[0].DeletionProtection' \
            --output text 2>/dev/null || echo "FALSE")

          if [ "$DELETION_PROTECTION" = "True" ] || [ "$DELETION_PROTECTION" = "TRUE" ] || [ "$DELETION_PROTECTION" = "true" ]; then
            echo "Disabling deletion protection on $DB_ID..."
            aws rds modify-db-instance \
              --db-instance-identifier "$DB_ID" \
              --no-deletion-protection \
              --apply-immediately
            echo "Deletion protection disabled."
          else
            echo "Deletion protection is already disabled on $DB_ID — skipping."
          fi

      - name: Terraform Destroy
        working-directory: terraform
        run: |-
          terraform destroy -auto-approve \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="private_key=${{ secrets.SSH_PRIVATE_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}"
